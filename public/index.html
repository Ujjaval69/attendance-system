<!DOCTYPE html>
<html>
<head>
  <title>Dashboard</title>
  <link rel="stylesheet" href="style.css">
  
</head>

<body>
  <div class="particles"></div>

<div class="navbar">
  <h2>🎓 Smart Attendance</h2>

  <div class="nav-right">
    <span id="userInfo"></span>
    <button onclick="toggleTheme()">🌙</button>
    <button onclick="logout()">Logout</button>
  </div>
</div>

<div class="dashboard">

  <!-- LEFT PANEL -->
  <div class="left">

    <div class="card animate">
      <h3>➕ Add Attendance</h3>

      <input id="name" placeholder="Student Name">
      <input id="subject" placeholder="Subject">

      <select id="status">
        <option>Present</option>
        <option>Absent</option>
      </select>

      <button onclick="addAttendance()">Add</button>
    </div>

    <div class="card animate">
      <h3>📊 Stats</h3>
      <p>Total: <span id="total">0</span></p>
      <p>Present: <span id="present">0</span></p>
      <p>Attendance: <span id="percent">0%</span></p>
    </div>

  </div>

  <!-- RIGHT -->
  <div class="card big animate">

    <h3>📋 Attendance Records</h3>

    <div class="filters">
      <input id="search" placeholder="Search...">
      <button onclick="searchAttendance()">Search</button>

      <select id="filterStatus">
        <option value="">All</option>
        <option>Present</option>
        <option>Absent</option>
      </select>

      <button onclick="filterAttendance()">Filter</button>
    </div>

    <ul id="list"></ul>

  </div>

</div>

<script src="script.js"></script>
</body>
</html>
